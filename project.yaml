name: m2m-bench
title: M2M-Bench
one_liner: Audit-grade benchmark for modality and mechanism concordance across LINCS and scPerturb perturbation-response data.
domain: Computational biology benchmark for perturbation-response concordance
stage: Task1 audited; corrected multisource Task2 through S6 audited; S7 implemented with implcheck evidence
owner: unknown
license: unknown
entrypoints:
  - python -m pip install -e ".[dev]"
  - python scripts/script1_reconstruct_task_centric_data.py --run-id <run_id>
  - python scripts/script1_cutover_task_centric_data.py --candidate-root /mnt/NAS_21T/ProjectData/M2M/data_candidate
datasets:
  - LINCS
  - scPerturb
  - scPerturb K562
outputs:
  - data_candidate/task1/manifest.json
  - data_candidate/task2/manifest.json
  - runs/task_centric_migration/<run_id>/migration_report/migration_report.json
  - runs/task_centric_migration/<run_id>/migration_report/migration_path_map.csv
  - runs/task_centric_migration/<run_id>/validation/task1/task1_validation.json
  - runs/task_centric_migration/<run_id>/validation/task2/task2_validation.json
components:
  - docs/contracts/
  - docs/governance/
  - scripts/
  - scripts/fm_extractors/
  - src/m2mbench/
  - runs/
