# M2M-Bench Global Configuration (Task1 + Legacy/Corrected Task2)

project:
  name: m2m-bench
  version: 0.4.0
  seed: 619  # 全局唯一真随机数种子 (Frozen)

paths:
  # 外部/原始输入源 (Read-only)
  raw_k562_dir: "/mnt/NAS_21T/ProjectData/Chem2Gen/Benchmark_Datasets/Evaluation_Set_K562"
  
  # 内部快照与运行结果 (Managed by pipeline)
  task1_snapshot: "data/task1_snapshot_v1"
  task2_snapshot: "data/task2_snapshot_v1"  # legacy/interim scPerturb-K562 snapshot; reused by legacy Task2 scripts and corrected multisource S3
  task2_snapshot_corrected: "data/task2_snapshot_v2"  # corrected multisource Task2 successor root materialized locally
  runs_dir: "runs"  # 本地兼容路径；当前可通过 NAS-backed symlink 保持可用

compute:
  edist_max_n: 256
  hit_k_list: [1, 5, 10]
  workers: 8  # 仅用于加速，不影响随机性
